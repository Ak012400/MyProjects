name: Build and Release

on:
  push:
    tags:
      - 'v*'   # jab bhi v1.0, v2.0 tag push karega

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller librosa noisereduce soundfile numpy matplotlib

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole noise_canceller.py

      - name: Zip build
        run: |
          powershell Compress-Archive -Path dist\noise_canceller.exe -DestinationPath noise_app.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: noise_app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}